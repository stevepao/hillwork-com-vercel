services:
  hillwork:
    build:
      context: .
    networks:
      proxy-tier:
        aliases:
          - hillwork
    ports:
      - "${APP_PORT:-8080}:3000"
    environment:
      SMTP_HOST: "${SMTP_HOST:-smtp.purelymail.com}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_ENCRYPTION: "${SMTP_ENCRYPTION:-ssl}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      CONTACT_TO: "${CONTACT_TO:-}"
      CONTACT_FROM: "${CONTACT_FROM:-}"
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"

networks:
  proxy-tier:
    external: true
